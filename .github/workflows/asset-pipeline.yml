name: Asset Pipeline

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'assets/**'
      - 'pipeline/**'
      - 'pipeline.toml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'tools/**'
      - 'common/pipeline/**'
      - 'common/shapes/**'
      - 'common/gltf/**'
      - 'CMakeLists.txt'
      - '.github/workflows/asset-pipeline.yml'

concurrency:
  group: asset-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asset-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SDL3 build dependencies
        run: |
          sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list /etc/apt/sources.list.d/azure-cli.list
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
            libxss-dev libxtst-dev libwayland-dev libxkbcommon-dev \
            libasound2-dev libpulse-dev

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python dependencies
        run: uv sync --extra dev

      - name: Cache CMake FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: fetchcontent-tools-${{ hashFiles('CMakeLists.txt', 'tools/**/CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-tools-

      - name: Build C tools
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target forge_mesh_tool forge_anim_tool forge_scene_tool forge_texture_tool basisu

      - name: Run pipeline
        run: uv run python -m pipeline --verbose

      - name: Upload processed assets
        uses: actions/upload-artifact@v4
        with:
          name: processed-assets
          path: assets/processed/

  # Publish a rolling release tarball on pushes to main so that
  # cmake/AcquireAssets.cmake (Tier 2) can download pre-built assets
  # without running the pipeline locally.
  publish-release:
    needs: asset-pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download processed assets
        uses: actions/download-artifact@v4
        with:
          name: processed-assets
          path: assets/processed/

      - name: Package processed assets
        run: tar czf processed-assets.tar.gz -C assets/processed .

      - name: Update assets-latest release
        run: |
          gh release create assets-latest --title "Pre-built processed assets" \
            --notes "Auto-generated by CI. Download and extract to assets/processed/." \
            --repo "${{ github.repository }}" 2>/dev/null || true
          gh release upload assets-latest processed-assets.tar.gz --clobber \
            --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
