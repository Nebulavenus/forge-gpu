# forge-gpu asset pipeline configuration — Lesson 02: Texture Processing
#
# This config demonstrates the texture plugin settings added in this lesson.

[pipeline]
source_dir = "assets/raw"        # Where raw source assets live
output_dir = "assets/processed"  # Where processed assets go
cache_dir  = ".forge-cache"      # Fingerprint cache for incremental builds

[texture]
max_size = 512             # Clamp textures to 512x512 for the demo
generate_mipmaps = true    # Generate a full mip chain for each texture
output_format = "png"      # Output as PNG (lossless)
# jpg_quality = 90         # Uncomment to use JPEG output with quality setting

# -- GPU texture compression (optional — requires basisu or astcenc installed)
# compression = "basisu"     # none, basisu, astc
# basisu_format = "uastc"    # etc1s (smaller) or uastc (higher quality)
# basisu_quality = 128       # 1-255, higher = better quality + slower
# astc_block_size = "6x6"    # 4x4, 5x5, 6x6, 8x8
# astc_quality = "medium"    # fastest, fast, medium, thorough, exhaustive
# normal_map = false         # true for normal maps (uses BC5/linear)

[mesh]
deduplicate = true
generate_tangents = true
