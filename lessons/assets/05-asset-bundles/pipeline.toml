# Example pipeline.toml for Asset Lesson 05 — Asset Bundles
#
# This configuration demonstrates bundling processed assets into a
# .forgepak file with zstd compression and dependency tracking.

[pipeline]
source_dir = "assets/raw"
output_dir = "assets/processed"
cache_dir  = ".forge-cache"

[texture]
max_size = 2048
generate_mipmaps = true
output_format = "png"

[mesh]
deduplicate = true
generate_tangents = true
lod_levels = [1.0, 0.5, 0.25]

[bundle]
bundle_dir = "assets/bundles"
